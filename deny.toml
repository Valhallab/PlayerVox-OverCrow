    { id = "RUSTSEC-2024-0412", reason = "the GTK3 GDK bindings are mandatory transitive Tauri dependencies on Linux; no safe compatible upgrade exists" },
    { id = "RUSTSEC-2024-0413", reason = "the GTK3 ATK bindings are mandatory transitive Tauri dependencies on Linux; no safe compatible upgrade exists" },
    { id = "RUSTSEC-2024-0414", reason = "the GTK3 X11 bindings are mandatory transitive Tauri dependencies on Linux; no safe compatible upgrade exists" },
    { id = "RUSTSEC-2024-0415", reason = "GTK3 is the current mandatory Tauri/WebKitGTK Linux backend; no safe compatible upgrade exists" },
    { id = "RUSTSEC-2024-0416", reason = "the GTK3 ATK sys bindings are mandatory transitive Tauri dependencies on Linux; no safe compatible upgrade exists" },
    { id = "RUSTSEC-2024-0417", reason = "the GTK3 X11 bindings are mandatory transitive Tauri dependencies on Linux; no safe compatible upgrade exists" },
    { id = "RUSTSEC-2024-0418", reason = "the GTK3 GDK sys bindings are mandatory transitive Tauri dependencies on Linux; no safe compatible upgrade exists" },
    { id = "RUSTSEC-2024-0419", reason = "the GTK3 macros are mandatory transitive Tauri dependencies on Linux; no safe compatible upgrade exists" },
    { id = "RUSTSEC-2024-0420", reason = "the GTK3 sys bindings are mandatory transitive Tauri dependencies on Linux; no safe compatible upgrade exists" },
    { id = "RUSTSEC-2025-0075", reason = "unic-char-range is pulled in by Tauri's URL pattern parser; current Tauri has no compatible replacement" },
    { id = "RUSTSEC-2025-0080", reason = "unic-common is pulled in by Tauri's URL pattern parser; current Tauri has no compatible replacement" },
    { id = "RUSTSEC-2025-0081", reason = "unic-char-property is pulled in by Tauri's URL pattern parser; current Tauri has no compatible replacement" },
    { id = "RUSTSEC-2025-0098", reason = "unic-ucd-version is pulled in by Tauri's URL pattern parser; current Tauri has no compatible replacement" },
    { id = "RUSTSEC-2025-0100", reason = "unic-ucd-ident is pulled in by Tauri's URL pattern parser; current Tauri has no compatible replacement" },
